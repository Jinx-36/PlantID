name: plantid
description: A complete, production-ready Flutter mobile application called PlantID.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  camera: ^0.10.5+5
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  sqflite: ^2.3.0
  path: ^1.8.3
  cached_network_image: ^3.3.0
  connectivity_plus: ^5.0.2
  permission_handler: ^11.1.0
  google_fonts: ^6.1.0
  path_provider: ^2.1.1
  uuid: ^4.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.7
  sqflite_common_ffi: ^2.4.0+3

flutter:
  uses-material-design: true
